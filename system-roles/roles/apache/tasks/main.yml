---
# tasks file for roles/apache
- name: Install package 
  ansible.builtin.dnf:
    name: httpd
    state: present
  notify: start httpd service

- name: Install firewalld
  ansible.builtin.dnf:
    name: firewalld
    state: present
    
    
- name: service start 
  ansible.posix.firewalld:
    service: http
    permanent: true 
    immediate: true
    state: enabled
  notify: start firewalld service

- name: create index.file
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html
  notify: start httpd service